# Server Configuration
server.port=${PORT:8080}
spring.application.name=loglens-ai

# Increase response size limits for large context windows and file uploads
server.tomcat.max-http-form-post-size=1GB
spring.codec.max-in-memory-size=1GB

# Keep-Alive: prevent Render free-tier spin-down by self-pinging the public health endpoint.
# KEEPALIVE_URL MUST be the PUBLIC url (e.g. https://loglens-api-5w5t.onrender.com/api/v1/health/ping) —
# a localhost ping does NOT reset Render's inbound-traffic idle timer.
keepalive.enabled=${KEEPALIVE_ENABLED:true}
keepalive.url=${KEEPALIVE_URL:}
keepalive.interval-ms=${KEEPALIVE_INTERVAL_MS:840000}

# Database Configuration - Use environment variables from Render
# These MUST be set in Render's dashboard - no localhost fallback (fail-fast).
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.datasource.driver-class-name=org.postgresql.Driver

# HikariCP Connection Pool Configuration
# Sized for the 512MB free-tier container: 20 connections wasted memory (driver
# buffers + threads) the box does not have. 5 is ample for this workload.
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.leak-detection-threshold=120000

# JPA Configuration
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=false

# ─── LLM providers ────────────────────────────────────────────────────────────
loglens.llm.provider=${LLM_PROVIDER:groq}
loglens.llm.embedding-provider=${EMBEDDING_PROVIDER:gemini}
loglens.llm.rate-limit-utilization=0.80

# ─── Groq API ─────────────────────────────────────────────────────────────────
groq.api-key=${GROQ_API_KEY:}
groq.api-keys=${GROQ_API_KEYS:}
groq.base-url=https://api.groq.com/openai/v1
groq.chat-model=llama-3.1-8b-instant
groq.embedding-model=nomic-embed-text-v1_5
groq.max-output-tokens=1024
groq.max-retries=3
groq.rate-limit-per-min=30
groq.tpm-limit=6000

# Gemini API Configuration - Use environment variables
gemini.api-key=${GEMINI_API_KEY:}
gemini.api-keys=${GEMINI_API_KEYS}
gemini.embedding-model=gemini-embedding-001
gemini.embedding-dimensions=768
gemini.generation-model=gemini-2.5-flash
gemini.base-url=https://generativelanguage.googleapis.com/v1beta
gemini.max-retries=3
gemini.timeout-seconds=60
gemini.rate-limit-retry-delay-ms=2000
# Proactive per-key embedding budgets (EmbeddingKeyPool): dispatch only within
# these windows -> no 429s by construction. Real free-tier limits are 100 RPM /
# 30K TPM per project; margins baked in. 429 anyway -> bench key 15s (daily -> 1h).
gemini.embedding-rpm-limit=75
gemini.embedding-tpm-limit=24000
gemini.cooldown-429-ms=15000
# Poison-batch guards: split embed batches by tokens (a request bigger than the
# 30K-TPM bucket can never succeed) and cap per-text size for embedding only.
gemini.embedding-max-request-tokens=10000
gemini.embedding-max-text-chars=8000
gemini.embedding-max-in-call-millis=240000
gemini.daily-cooldown-minutes=60
gemini.max-output-tokens=8192
gemini.max-context-chunks=150
gemini.max-conversation-history=50

loglens.gemini.rate-limit-per-min=80
loglens.gemini.rate-limit-utilization=0.80
loglens.gemini.context-limit-tokens=1000000
loglens.gemini.max-output-tokens=8192

# ─── RAG / Embedding pipeline ─────────────────────────────────────────────────
loglens.embedding.batch-size=10
loglens.embedding.enabled=true
loglens.rag.max-retrieved-chunks=500
loglens.rag.utilization=0.80

# ─── Kafka / MinIO / orchestrator — MUST be set via env vars on Render ────────
# These have NO safe default on a hosted platform; they must point at your
# externally-hosted Kafka broker, MinIO/S3-compatible store, and orchestrator.
spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS}
# Redpanda Cloud Serverless issues SCRAM-SHA-256 credentials by default.
spring.kafka.properties.security.protocol=${KAFKA_SECURITY_PROTOCOL:SASL_SSL}
spring.kafka.properties.sasl.mechanism=${KAFKA_SASL_MECHANISM:SCRAM-SHA-256}
spring.kafka.properties.sasl.jaas.config=org.apache.kafka.common.security.scram.ScramLoginModule required username="${KAFKA_SASL_USERNAME:}" password="${KAFKA_SASL_PASSWORD:}";
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer
spring.kafka.producer.acks=all
spring.kafka.producer.properties.enable.idempotence=true
spring.kafka.producer.properties.spring.json.add.type.headers=false
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.enable-auto-commit=false
# Budget waits (pool acquire <=90s + rotations) can hold a record several minutes
spring.kafka.consumer.properties.max.poll.interval.ms=900000
# CRITICAL: process ONE record per poll. Each EMBED_BATCH can block up to ~90s in
# EmbeddingKeyPool.acquire() (plus the embedding HTTP call); the default of 500
# records/poll processes them all before re-polling, blowing max.poll.interval.ms
# → the consumer is kicked, offsets never commit, work redelivers forever
# (Gemini keeps getting called but embeddings never persist). One-per-poll keeps
# every poll() well inside the interval.
spring.kafka.consumer.properties.max.poll.records=1
spring.kafka.listener.ack-mode=MANUAL
loglens.window-seconds=60
loglens.enrich.max-content-chars=5000
# NOTE: "minio.*"/"MINIO_*" here is just the property/env-var naming inherited
# from the generic io.minio S3 client SDK — in production these actually point
# at Backblaze B2 (S3-compatible), NOT a MinIO server. See MinioStorageService
# for details; MinIO itself has no free hosted/managed cloud offering.
loglens.minio.endpoint=${MINIO_ENDPOINT}
loglens.minio.access-key=${MINIO_ACCESS_KEY}
loglens.minio.secret-key=${MINIO_SECRET_KEY}
loglens.minio.bucket=${MINIO_BUCKET:loglens-prod}
loglens.orchestrator.url=${ORCHESTRATOR_URL:http://localhost:8000}

# ─── Guest / demo mode ────────────────────────────────────────────────────────
loglens.guest.session-id=${GUEST_SESSION_ID:}
loglens.guest.email=guest@loglens.demo

# JWT Configuration
jwt.secret=${JWT_SECRET}
jwt.expiration=86400000

# File Upload Configuration
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=1GB
spring.servlet.multipart.max-request-size=2GB
spring.servlet.multipart.file-size-threshold=2MB

# File Storage Configuration - Use temp directory in production
file.storage.directory=${TMPDIR:/tmp}/uploads

# Logging
logging.level.com.loglens=INFO
logging.level.org.springframework.security=WARN

