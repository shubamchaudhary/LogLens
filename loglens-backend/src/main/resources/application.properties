# ─────────────────────────────────────────────────────────────────────────────
# LogLens — Application Configuration
# ─────────────────────────────────────────────────────────────────────────────

server.port=8080
spring.application.name=loglens

# ─── HTTP limits (large log files) ───────────────────────────────────────────
server.tomcat.max-http-form-post-size=1GB
spring.codec.max-in-memory-size=1GB

# ─── Database ─────────────────────────────────────────────────────────────────
# NOTE: db name/user/password stay "loglens*" on purpose (existing local
# Postgres data); renaming it is a separate data-migration task.
spring.datasource.url=jdbc:postgresql://127.0.0.1:5434/loglens_db?user=loglens&password=loglens123
spring.datasource.username=loglens
spring.datasource.password=loglens123
spring.datasource.driver-class-name=org.postgresql.Driver

# HikariCP — sized for 5 embedding workers + 5 summarization workers + HTTP threads + jobs
spring.datasource.hikari.maximum-pool-size=30
spring.datasource.hikari.minimum-idle=10
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000
# 120s threshold accounts for long API calls made outside transactions
spring.datasource.hikari.leak-detection-threshold=120000

# ─── JPA ──────────────────────────────────────────────────────────────────────
# Schema is owned externally (schema-v2.sql via docker init; Flyway later), so
# Hibernate neither generates nor validates DDL.
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
# Disabled: the SSE /progress endpoint returns a long-lived SseEmitter (up to
# 10 min). With open-in-view on, the request's EntityManager — and its pooled DB
# connection — stays bound for the whole stream, tripping Hikari leak detection
# and starving the pool. All read paths use explicit repository/JDBC calls, so no
# in-view lazy loading is needed.
spring.jpa.open-in-view=false

# ─── LLM providers ────────────────────────────────────────────────────────────
# Chat: groq (default) or gemini — selects the lane key pool, pacing, transport.
# Embeddings are SPLIT from chat: Groq serves no embedding models (2026-07), so
# they default to gemini (gemini-embedding-001 @ 768 dims; embedding quota was
# untouched by Google's text-out RPD crackdown). Requires GEMINI_API_KEY(S).
# NOTE: embeddings from different models never mix — switching embedding
# provider means re-ingesting existing sessions.
loglens.llm.provider=${LLM_PROVIDER:groq}
loglens.llm.embedding-provider=${EMBEDDING_PROVIDER:gemini}
loglens.llm.rate-limit-utilization=0.80

# ─── Groq API (OpenAI-compatible; free tier 30 RPM / 14,400 RPD on 8b-instant) ─
groq.api-key=${GROQ_API_KEY:}
groq.api-keys=${GROQ_API_KEYS:}
groq.base-url=https://api.groq.com/openai/v1
groq.chat-model=llama-3.1-8b-instant
# nomic-embed-text-v1_5 natively outputs 768 dims — matches vector(768)
groq.embedding-model=nomic-embed-text-v1_5
# Findings JSON is small; a low cap keeps each request well under the TPM ceiling.
# (Groq's 413 size pre-check counts prompt + THIS reserved value.)
groq.max-output-tokens=1024
groq.max-retries=3
groq.rate-limit-per-min=30
# The BINDING free-tier limit on 8b-instant is tokens/min, not requests/min. Lanes
# pace against this (× rate-limit-utilization) so we stop 429-storming. Per KEY —
# assumes the 5 GROQ_API_KEYS are distinct accounts; same-account keys share it.
groq.tpm-limit=6000

# ─── Gemini API (fallback provider: loglens.llm.provider=gemini) ──────────────
gemini.api-key=${GEMINI_API_KEY:API_KEY_1}
gemini.api-keys=${GEMINI_API_KEYS:API_KEY_1,API_KEY_2,API_KEY_3,API_KEY_4,API_KEY_5}
gemini.embedding-model=gemini-embedding-001
gemini.embedding-dimensions=768
gemini.generation-model=gemini-2.5-flash
gemini.base-url=https://generativelanguage.googleapis.com/v1beta
gemini.max-retries=3
# Proactive per-key embedding budgets (EmbeddingKeyPool): dispatch only within
# these windows -> no 429s by construction. Real free-tier limits are 100 RPM /
# 30K TPM per project; margins baked in. 429 anyway -> bench key 15s (daily -> 1h).
gemini.embedding-rpm-limit=75
gemini.embedding-tpm-limit=24000
gemini.cooldown-429-ms=15000
gemini.daily-cooldown-minutes=60
# Poison-batch guards: split embed batches by tokens (a request bigger than the
# 30K-TPM bucket can never succeed) and cap per-text size for embedding only.
gemini.embedding-max-request-tokens=10000
gemini.embedding-max-text-chars=8000
gemini.embedding-max-in-call-millis=240000
gemini.timeout-seconds=60
# On a 429, embedding calls rotate to the next Gemini key and wait this long
# before retrying (cycling all keys) so a rate limit never fails the batch.
gemini.rate-limit-retry-delay-ms=5000
gemini.max-output-tokens=8192

# ─── LogLens — Rate limiting ────────────────────────────────────────────────
# 80% of 10 calls/min = 8 calls/min = 7,500 ms between calls per key
loglens.gemini.rate-limit-per-min=10
loglens.gemini.rate-limit-utilization=0.80
# Gemini 2.5 Flash context window
loglens.gemini.context-limit-tokens=1000000

# ─── LogLens — Embedding pipeline ──────────────────────────────────────────
# Texts per batchEmbedContents call. Sized by TOKENS, not the API's 100-text cap:
# a 60-line log window ≈ 1.6K tokens and free-tier embedding TPM is 30K/project,
# so 5 texts ≈ 8K tokens/call → ~3 calls/min/key of headroom (10 ≈ 16K meant
# barely 1 call/min/key and constant TPM 429s).
loglens.embedding.batch-size=10

# ─── LogLens — RAG / Recursive Summarization ───────────────────────────────
loglens.rag.max-retrieved-chunks=500
loglens.rag.utilization=0.80

# ─── LogLens v2 — Kafka / MinIO / pipeline ───────────────────────────────────
spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
# Producer: String keys, JSON values, no type headers (explicit target types on
# the consumer side), idempotent + acks=all for safe at-least-once delivery.
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer
spring.kafka.producer.acks=all
spring.kafka.producer.properties.enable.idempotence=true
spring.kafka.producer.properties.spring.json.add.type.headers=false
# Consumer: JSON payloads arrive as UTF-8 strings and are converted to the
# listener's declared type by the StringJsonMessageConverter bean. Manual ack +
# no auto-commit → offsets are committed only after the DB write (at-least-once).
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.enable-auto-commit=false
spring.kafka.consumer.properties.max.poll.interval.ms=900000
# Process ONE record per poll: each record can block up to ~90s (EmbeddingKeyPool
# acquire + embedding call), so the 500-record default would blow max.poll.interval.ms
# and trigger a rebalance storm where offsets never commit. See production profile.
spring.kafka.consumer.properties.max.poll.records=1
spring.kafka.listener.ack-mode=MANUAL
loglens.window-seconds=60
# Max characters of raw log content per enrichment LLM call. Larger windows are
# PARTITIONED into multiple calls on RECORD boundaries (a timestamped line + its
# continuation lines stay together, so multi-line stack traces are never split);
# findings dedupe via fingerprint so no evidence is lost. Each call stays under
# the provider's per-request token budget — e.g. Groq llama-3.1-8b-instant free
# tier caps at 6000 tokens/min and rejects an oversized prompt with a
# non-retryable 413. 5000 chars (~1.25k tokens) + system prompt + metrics stays
# under 6000 alongside max-output-tokens; 429 bursts hit the retry lane.
loglens.enrich.max-content-chars=5000
loglens.embedding.enabled=true
loglens.embedding.batch-size=10
loglens.minio.endpoint=${MINIO_ENDPOINT:http://localhost:9000}
loglens.minio.access-key=${MINIO_ACCESS_KEY:minioadmin}
loglens.minio.secret-key=${MINIO_SECRET_KEY:minioadmin123}
loglens.minio.bucket=staging
loglens.orchestrator.url=${ORCHESTRATOR_URL:http://localhost:8000}

# ─── JWT ──────────────────────────────────────────────────────────────────────
jwt.secret=${JWT_SECRET:your-secret-key-change-in-production-min-256-bits-please-use-a-long-random-string}
jwt.expiration=86400000

# ─── Guest / demo mode ────────────────────────────────────────────────────────
# Set GUEST_SESSION_ID to the UUID of a precomputed analysis session that the
# recruiter "guest" account will land on. Leave blank to disable guest login.
loglens.guest.session-id=${GUEST_SESSION_ID:}
loglens.guest.email=guest@loglens.demo

# ─── File upload ──────────────────────────────────────────────────────────────
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=1GB
spring.servlet.multipart.max-request-size=2GB
spring.servlet.multipart.file-size-threshold=2MB
file.storage.directory=./uploads

# ─── Logging ──────────────────────────────────────────────────────────────────
logging.level.com.loglens=INFO
logging.level.org.springframework.security=WARN

loglens.gemini.max-output-tokens=8192
