# ─────────────────────────────────────────────────────────────────────────────
# DeepDocAI — Application Configuration
# ─────────────────────────────────────────────────────────────────────────────

server.port=8080
spring.application.name=deepdocai

# ─── HTTP limits (large log files) ───────────────────────────────────────────
server.tomcat.max-http-form-post-size=1GB
spring.codec.max-in-memory-size=1GB

# ─── Database ─────────────────────────────────────────────────────────────────
spring.datasource.url=jdbc:postgresql://127.0.0.1:5434/deepdocai_db?user=deepdocai&password=deepdocai123
spring.datasource.username=deepdocai
spring.datasource.password=deepdocai123
spring.datasource.driver-class-name=org.postgresql.Driver

# HikariCP — sized for 5 embedding workers + 5 summarization workers + HTTP threads + jobs
spring.datasource.hikari.maximum-pool-size=30
spring.datasource.hikari.minimum-idle=10
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000
# 120s threshold accounts for long API calls made outside transactions
spring.datasource.hikari.leak-detection-threshold=120000

# ─── JPA ──────────────────────────────────────────────────────────────────────
# Schema is owned externally (schema-v2.sql via docker init; Flyway later), so
# Hibernate neither generates nor validates DDL.
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# ─── LLM providers ────────────────────────────────────────────────────────────
# Chat: groq (default) or gemini — selects the lane key pool, pacing, transport.
# Embeddings are SPLIT from chat: Groq serves no embedding models (2026-07), so
# they default to gemini (gemini-embedding-001 @ 768 dims; embedding quota was
# untouched by Google's text-out RPD crackdown). Requires GEMINI_API_KEY(S).
# NOTE: embeddings from different models never mix — switching embedding
# provider means re-ingesting existing sessions.
chunkai.llm.provider=${LLM_PROVIDER:groq}
chunkai.llm.embedding-provider=${EMBEDDING_PROVIDER:gemini}
chunkai.llm.rate-limit-utilization=0.80

# ─── Groq API (OpenAI-compatible; free tier 30 RPM / 14,400 RPD on 8b-instant) ─
groq.api-key=${GROQ_API_KEY:}
groq.api-keys=${GROQ_API_KEYS:}
groq.base-url=https://api.groq.com/openai/v1
groq.chat-model=llama-3.1-8b-instant
# nomic-embed-text-v1_5 natively outputs 768 dims — matches vector(768)
groq.embedding-model=nomic-embed-text-v1_5
groq.max-output-tokens=4096
groq.max-retries=3
groq.rate-limit-per-min=30

# ─── Gemini API (fallback provider: chunkai.llm.provider=gemini) ──────────────
gemini.api-key=${GEMINI_API_KEY:API_KEY_1}
gemini.api-keys=${GEMINI_API_KEYS:API_KEY_1,API_KEY_2,API_KEY_3,API_KEY_4,API_KEY_5}
gemini.embedding-model=gemini-embedding-001
gemini.embedding-dimensions=768
gemini.generation-model=gemini-2.5-flash
gemini.base-url=https://generativelanguage.googleapis.com/v1beta
gemini.max-retries=3
gemini.timeout-seconds=60
gemini.max-output-tokens=8192

# ─── DeepDocAI — Rate limiting ────────────────────────────────────────────────
# 80% of 10 calls/min = 8 calls/min = 7,500 ms between calls per key
deepdocai.gemini.rate-limit-per-min=10
deepdocai.gemini.rate-limit-utilization=0.80
# Gemini 2.5 Flash context window
deepdocai.gemini.context-limit-tokens=1000000

# ─── DeepDocAI — Embedding pipeline ──────────────────────────────────────────
# Max texts per batchEmbedContents call (Gemini supports up to 100)
deepdocai.embedding.batch-size=80

# ─── DeepDocAI — RAG / Recursive Summarization ───────────────────────────────
deepdocai.rag.max-retrieved-chunks=500
deepdocai.rag.utilization=0.80

# ─── ChunkAI v2 — Kafka / MinIO / pipeline ───────────────────────────────────
spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
# Producer: String keys, JSON values, no type headers (explicit target types on
# the consumer side), idempotent + acks=all for safe at-least-once delivery.
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer
spring.kafka.producer.acks=all
spring.kafka.producer.properties.enable.idempotence=true
spring.kafka.producer.properties.spring.json.add.type.headers=false
# Consumer: JSON payloads arrive as UTF-8 strings and are converted to the
# listener's declared type by the StringJsonMessageConverter bean. Manual ack +
# no auto-commit → offsets are committed only after the DB write (at-least-once).
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.enable-auto-commit=false
spring.kafka.listener.ack-mode=MANUAL
chunkai.window-seconds=60
chunkai.embedding.enabled=true
chunkai.embedding.batch-size=80
chunkai.minio.endpoint=${MINIO_ENDPOINT:http://localhost:9000}
chunkai.minio.access-key=${MINIO_ACCESS_KEY:minioadmin}
chunkai.minio.secret-key=${MINIO_SECRET_KEY:minioadmin123}
chunkai.minio.bucket=staging
chunkai.orchestrator.url=${ORCHESTRATOR_URL:http://localhost:8000}

# ─── JWT ──────────────────────────────────────────────────────────────────────
jwt.secret=${JWT_SECRET:your-secret-key-change-in-production-min-256-bits-please-use-a-long-random-string}
jwt.expiration=86400000

# ─── File upload ──────────────────────────────────────────────────────────────
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=1GB
spring.servlet.multipart.max-request-size=2GB
spring.servlet.multipart.file-size-threshold=2MB
file.storage.directory=./uploads

# ─── Logging ──────────────────────────────────────────────────────────────────
logging.level.com.deepdocai=INFO
logging.level.org.springframework.security=WARN

deepdocai.gemini.max-output-tokens=8192
