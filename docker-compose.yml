version: '3.8'

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: deepdocai-postgres
    environment:
      POSTGRES_DB: deepdocai_db
      POSTGRES_USER: deepdocai
      POSTGRES_PASSWORD: deepdocai123
    ports:
      - "5434:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./schema-v2.sql:/docker-entrypoint-initdb.d/schema-v2.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U deepdocai"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Kafka — single-node KRaft (no ZooKeeper) ────────────────────────────────
  # Durable buffer for the LLM enrichment lanes (partition-per-API-key).
  kafka:
    image: apache/kafka:latest
    container_name: chunkai-kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@localhost:9093
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_LOG_DIRS: /var/lib/kafka/data
    volumes:
      - kafka_data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 10

  # ── MinIO — S3-compatible staging blob store ────────────────────────────────
  # Uploads land here; the chunker streams them, then they are deleted.
  minio:
    image: minio/minio
    container_name: chunkai-minio
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # web console
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin123
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── RAG orchestrator — FastAPI + LangGraph sidecar (Phase 4) ─────────────────
  # Called by the backend at CORRELATING: correlates findings into incidents,
  # writes the report, and answers drill-down questions over the chunk store.
  rag-orchestrator:
    build: ./rag-orchestrator
    container_name: chunkai-orchestrator
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://deepdocai:deepdocai123@postgres:5432/deepdocai_db
      LLM_PROVIDER: ${LLM_PROVIDER:-groq}
      EMBEDDING_PROVIDER: ${EMBEDDING_PROVIDER:-gemini}
      # Plural *_API_KEYS are round-robined across all N keys (daily quota = sum
      # of every account's budget). Singular vars are still honoured as fallback.
      GROQ_API_KEYS: ${GROQ_API_KEYS:-}
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      GEMINI_API_KEYS: ${GEMINI_API_KEYS:-}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
  kafka_data:
  minio_data:

