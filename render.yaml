# Render.com Blueprint Configuration
# See: https://render.com/docs/blueprint-spec

services:
  # Backend API Service
  - type: web
    name: loglens-api
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free
    region: oregon
    healthCheckPath: /api/v1/health
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: production
      - key: PORT
        value: 8080
      - key: SPRING_DATASOURCE_URL
        sync: false
      - key: SPRING_DATASOURCE_USERNAME
        sync: false
      - key: SPRING_DATASOURCE_PASSWORD
        sync: false
      - key: LLM_PROVIDER
        value: groq
      - key: EMBEDDING_PROVIDER
        value: gemini
      - key: GROQ_API_KEYS
        sync: false
      - key: GEMINI_API_KEYS
        sync: false
      - key: KAFKA_BOOTSTRAP_SERVERS
        sync: false
      - key: KAFKA_SECURITY_PROTOCOL
        value: SASL_SSL
      - key: KAFKA_SASL_MECHANISM
        value: SCRAM-SHA-256
      - key: KAFKA_SASL_USERNAME
        sync: false
      - key: KAFKA_SASL_PASSWORD
        sync: false
      - key: MINIO_ENDPOINT
        sync: false
      - key: MINIO_ACCESS_KEY
        sync: false
      - key: MINIO_SECRET_KEY
        sync: false
      - key: MINIO_BUCKET
        value: loglens-prod
      - key: ORCHESTRATOR_URL
        sync: false
      - key: GUEST_SESSION_ID
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: CORS_ALLOWED_ORIGINS
        sync: false
      - key: KEEPALIVE_ENABLED
        value: "true"
      - key: KEEPALIVE_URL
        value: "https://loglens.onrender.com/api/v1/health/ping"
      - key: KEEPALIVE_INTERVAL_MS
        value: "840000"

databases:
  - name: loglens-db
    plan: free
    databaseName: loglens_db
    user: loglens
    region: oregon
    postgresMajorVersion: "16"
    ipAllowList: []
